<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Musée du Brainrot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#241552; --bg2:#3b1d7a; --bg3:#7a2a8f;
  --card:#ffffff; --ink:#241a4d; --ink-soft:#7a72a3;
  /* couleurs de rareté façon jeu */
  --c-commun:#3ecf6a; --c-rare:#3da5ff; --c-epique:#b15cff;
  --c-legendaire:#ffce3a; --c-mythique:#ff4d4d;
  --c-dieu:#1fd1c1; --c-secret:#dfe4f2; --c-og:#f5c518;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Nunito',sans-serif;color:#fff;min-height:100vh;
  background:linear-gradient(160deg,#190d3c,#2a1456 60%,#3a1a4f);
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
/* fond d'écran de la collection : l'INTÉRIEUR du musée, fixe et voilé pour lire les cartes */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(rgba(10,5,26,.42), rgba(10,5,26,.60)),
             url('fond.jpg') center / cover no-repeat}
.wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:0 18px}

/* ---------- HEADER ---------- */
header{text-align:center;padding:20px 18px 4px;position:relative;z-index:1}
.banner{display:block;width:100%;max-width:760px;margin:0 auto 8px;border-radius:18px;
  box-shadow:0 16px 44px rgba(0,0,0,.55);border:2px solid rgba(255,255,255,.12)}
.logo{font-size:54px;display:inline-block;animation:wobble 3s ease-in-out infinite}
@keyframes wobble{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
.eyebrow{font-family:'Fredoka';font-weight:600;font-size:clamp(13px,3vw,17px);
  letter-spacing:.12em;text-transform:uppercase;color:#e9d9ff;opacity:.92;margin-top:8px}
h1{
  font-family:'Fredoka';font-weight:700;font-size:clamp(52px,15vw,104px);line-height:.9;
  letter-spacing:.005em;margin:2px 0 2px;
  background:linear-gradient(90deg,#ffd84d,#ff7eb3,#7afcff,#ffd84d);
  background-size:300% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;
  animation:shine 6s linear infinite;
  text-shadow:0 6px 0 rgba(0,0,0,.12);
}
@keyframes shine{to{background-position:300% 0}}
.tagline{font-family:'Fredoka';font-weight:500;font-size:clamp(15px,3vw,20px);color:#e9d9ff;margin-top:8px}
.count-pill{
  display:inline-block;margin-top:16px;background:rgba(255,255,255,.16);
  border:2px solid rgba(255,255,255,.35);border-radius:999px;
  padding:8px 18px;font-family:'Fredoka';font-weight:600;font-size:15px;
}

/* ---------- PAGE D'ACCUEIL : façade plein écran + bouton Entrer ---------- */
#intro{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;justify-content:center;
  padding:0 24px max(env(safe-area-inset-bottom,0px) + 28px, 6vh);
  background:linear-gradient(to top, rgba(8,4,22,.72), rgba(8,4,22,0) 48%),
             url('titre.jpg') center / cover no-repeat;
  transition:opacity .6s ease}
#intro.hide{opacity:0;pointer-events:none}
.enter-btn{font-family:'Fredoka';font-weight:700;font-size:clamp(18px,5vw,30px);
  letter-spacing:.08em;color:#3a2400;cursor:pointer;border:none;border-radius:999px;
  padding:16px 56px;background:linear-gradient(90deg,#ffe07a,#ffb01f);
  box-shadow:0 12px 34px rgba(255,176,31,.55);animation:pulseBtn 2s ease-in-out infinite;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}
@keyframes pulseBtn{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.enter-btn:hover{transform:scale(1.09)}

/* ---------- CONTROLS ---------- */
.controls{position:sticky;top:0;z-index:30;padding:14px 18px 16px;margin:0 0 6px;
  background:linear-gradient(180deg, rgba(16,9,38,.92) 62%, rgba(16,9,38,.74))}
.controls-inner{max-width:1180px;margin:0 auto;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center}
.search{flex:1 1 220px;max-width:320px;display:flex;align-items:center;gap:8px;
  background:#fff;border-radius:999px;padding:10px 16px;color:var(--ink);box-shadow:0 6px 16px rgba(0,0,0,.2)}
.search input{background:none;border:none;outline:none;color:var(--ink);font-family:'Nunito';font-weight:700;font-size:16px;width:100%}
.search input::placeholder{color:#b3adcf}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.chip{font-family:'Fredoka';font-weight:600;font-size:14px;padding:8px 16px;border-radius:999px;
  cursor:pointer;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;
  transition:transform .12s,background .15s}
.chip:hover{transform:translateY(-2px);background:rgba(255,255,255,.2)}
.chip.active{background:#fff;color:var(--ink);border-color:#fff}
/* raretés colorées sur les chips actifs */
#chips .chip[data-f="commun"].active{background:var(--c-commun);border-color:var(--c-commun);color:#fff}
#chips .chip[data-f="rare"].active{background:var(--c-rare);border-color:var(--c-rare);color:#fff}
#chips .chip[data-f="epique"].active{background:var(--c-epique);border-color:var(--c-epique);color:#fff}
#chips .chip[data-f="legendaire"].active{background:var(--c-legendaire);border-color:var(--c-legendaire);color:#5a3d00}
#chips .chip[data-f="mythique"].active{background:var(--c-mythique);border-color:var(--c-mythique);color:#fff}
#chips .chip[data-f="dieu"].active{background:var(--c-dieu);border-color:var(--c-dieu);color:#06302c}
#chips .chip[data-f="secret"].active{background:var(--c-secret);border-color:var(--c-secret);color:#2a2350}
#chips .chip[data-f="og"].active{background:var(--c-og);border-color:var(--c-og);color:#3a2c00}
.add-btn{font-family:'Fredoka';font-weight:600;font-size:14px;padding:9px 18px;border-radius:999px;
  cursor:pointer;border:none;color:#fff;background:linear-gradient(90deg,#ff6ec4,#ff9a5a);
  box-shadow:0 6px 16px rgba(255,110,196,.4);transition:transform .12s}
.add-btn:hover{transform:translateY(-2px) scale(1.03)}

.controls-top{justify-content:space-between}
.controls-top-btns{display:flex;gap:8px;align-items:center;flex-shrink:0}
.filter-toggle{display:none;font-family:'Fredoka';font-weight:600;font-size:13.5px;
  padding:9px 16px;border-radius:999px;border:2px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.1);color:#fff;cursor:pointer;transition:background .15s;
  -webkit-tap-highlight-color:transparent}
.filter-toggle.open{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.55)}
.filters-panel{/* toujours visible sur desktop */}

/* compteur de complétion + statut attrapé/à attraper */
.completion{display:flex;flex-direction:column;align-items:center;gap:6px;margin:0 auto 12px;max-width:520px}
.comp-text{font-family:'Fredoka';font-weight:600;font-size:15px;color:#fff}
.reset-btn{font-family:'Fredoka';font-weight:600;font-size:11.5px;padding:3px 10px;border-radius:20px;border:1px solid rgba(255,120,120,.4);background:rgba(255,80,80,.1);color:#ff9999;cursor:pointer;transition:background .15s}
.reset-btn:hover{background:rgba(255,80,80,.25)}
.sync-btn{font-family:'Fredoka';font-weight:600;font-size:11.5px;padding:3px 10px;border-radius:20px;border:1px solid rgba(120,200,255,.45);background:rgba(80,160,255,.12);color:#9cd0ff;cursor:pointer;transition:background .15s}
.sync-btn:hover{background:rgba(80,160,255,.28)}
.sync-code{width:100%;background:#f4f2fc;border:2px solid #e6e2f5;border-radius:12px;padding:11px 13px;
  color:var(--ink);font-family:monospace;font-size:12px;line-height:1.4;resize:vertical;min-height:70px;outline:none;word-break:break-all}
.sync-step{font-family:'Fredoka';font-weight:600;font-size:13px;color:var(--ink);margin:14px 0 6px;text-align:left}
.sync-ok{font-family:'Fredoka';font-weight:600;font-size:12.5px;color:#16a34a;text-align:center;margin-top:6px;min-height:16px}
.comp-bar{width:100%;height:10px;border-radius:999px;background:rgba(255,255,255,.18);overflow:hidden}
.comp-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#ffd84d,#ff9a5a);transition:width .4s}
.controls-status{margin-top:4px;gap:8px}
#chipsStatus .chip.active{background:#fff;color:var(--ink);border-color:#fff}

/* deuxième rangée : comptes */
.controls-coll{margin-top:10px;gap:8px}
.coll-label{font-family:'Fredoka';font-weight:600;font-size:14px;color:#e9d9ff;margin-right:2px}
.chip-acc{display:inline-flex;flex-direction:column;align-items:flex-start;text-align:left;
  line-height:1.1;padding:7px 14px 7px 28px!important;position:relative}
.chip-acc::before{content:"";position:absolute;left:12px;top:50%;transform:translateY(-50%);
  width:11px;height:11px;border-radius:50%;background:var(--c,#aaa);box-shadow:0 0 0 2px rgba(255,255,255,.5)}
.ca-top{font-size:11px;opacity:.8;font-weight:500}
.ca-name{font-size:14px;font-weight:700}
#chipsColl .chip.active{background:var(--c,#fff);border-color:var(--c,#fff);color:#fff}

/* ---------- GALLERY ---------- */
.count{display:none}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:22px;padding:8px 0 70px}
.gallery.no-anim .card{animation:none!important}
.card{
  position:relative;background:var(--card);border-radius:22px;cursor:pointer;overflow:hidden;
  border:4px solid var(--rc);padding-bottom:6px;
  content-visibility:auto;contain-intrinsic-size:auto 380px;
  box-shadow:0 10px 26px rgba(0,0,0,.28), 0 0 0 0 var(--rc);
  transition:transform .16s cubic-bezier(.3,1.4,.5,1), box-shadow .2s;
  animation:pop .5s cubic-bezier(.2,1.3,.4,1) both;
}
@keyframes pop{from{opacity:0;transform:scale(.85) translateY(18px)}to{opacity:1;transform:none}}
.card:hover{transform:translateY(-8px) scale(1.025)}
.card:hover{box-shadow:0 18px 34px rgba(0,0,0,.34), 0 0 26px -4px var(--rc)}
.idtag{position:absolute;top:10px;left:12px;z-index:3;font-family:'Fredoka';font-weight:600;
  font-size:12px;color:#fff;background:rgba(36,26,77,.55);border-radius:999px;padding:3px 9px}
.stage{position:relative;height:210px;display:grid;place-items:center;margin-top:4px}
.halo{position:absolute;width:185px;height:185px;border-radius:50%;
  background:radial-gradient(circle,var(--rc),transparent 68%);opacity:.45}
.r-legendaire .halo,.r-mythique .halo{animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.75;transform:scale(1.12)}}
.subject{position:relative;z-index:2;display:grid;place-items:center;height:190px;width:100%}
.subject img{max-width:88%;max-height:185px;object-fit:contain;border-radius:12px;
  filter:drop-shadow(0 10px 10px rgba(0,0,0,.3))}
.creature{animation:bob 3.4s ease-in-out infinite;width:100%;display:flex;justify-content:center;align-items:center}
.card:nth-child(2n) .creature{animation-duration:4.1s;animation-delay:-1.2s}
.card:nth-child(3n) .creature{animation-duration:2.9s;animation-delay:-.6s}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
.ph{font-size:92px;line-height:1;filter:drop-shadow(0 8px 8px rgba(0,0,0,.25))}
.ph-note{position:absolute;bottom:4px;left:0;right:0;text-align:center;z-index:3;
  font-family:'Fredoka';font-size:11px;color:#b3adcf;font-weight:500}
.sparkle{position:absolute;z-index:3;font-size:20px;animation:tw 1.8s ease-in-out infinite}
.sparkle.s1{top:14px;right:14px}.sparkle.s2{bottom:64px;left:14px;animation-delay:.9s;font-size:15px}
@keyframes tw{0%,100%{opacity:.3;transform:scale(.7)}50%{opacity:1;transform:scale(1.1)}}
.info{padding:2px 14px 0;text-align:center}
.pname{font-family:'Fredoka';font-weight:700;font-size:19px;color:var(--ink);line-height:1.05;margin-bottom:8px}
.badges{display:flex;gap:6px;justify-content:center;align-items:center;flex-wrap:wrap}
.tier{font-family:'Fredoka';font-weight:600;font-size:12px;color:#fff;padding:4px 11px;border-radius:999px;background:var(--rc)}
.r-legendaire .tier,.r-secret .tier,.r-og .tier{color:#3a2c00}
.r-dieu .tier{color:#06302c}
.acc{display:inline-flex;align-items:center;gap:5px;font-family:'Nunito';font-weight:800;font-size:11px;
  color:var(--ink-soft);background:#f0eefb;border-radius:999px;padding:4px 10px 4px 8px}
.acc::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--c,#aaa)}
/* "à attraper" : carte grisée + pastille */
.card.todo{filter:grayscale(.85) brightness(.82);opacity:.9}
.card.todo .creature{opacity:.55}
.todo-tag{display:inline-flex;align-items:center;gap:4px;font-family:'Fredoka';font-weight:600;font-size:11px;
  color:var(--ink-soft);background:#eceaf3;border:1px dashed #c3bce0;border-radius:999px;padding:3px 10px}
.seen-tag{display:inline-flex;align-items:center;gap:4px;font-family:'Fredoka';font-weight:600;font-size:11px;
  color:#c4b5fd;background:rgba(139,92,246,.18);border:1px dashed #7c3aed;border-radius:999px;padding:3px 10px}
.seen-btn{font-family:'Fredoka';font-weight:700;font-size:12.5px;border:2px solid rgba(139,92,246,.35);
  background:transparent;color:rgba(196,181,253,.7);border-radius:999px;padding:5px 14px;
  cursor:pointer;transition:all .15s;display:block;width:calc(100% - 28px);margin:2px 14px 6px}
.seen-btn:hover{background:rgba(139,92,246,.18);color:#c4b5fd}
.seen-btn.active{background:rgba(139,92,246,.28);color:#e9d5ff;border-color:#a78bfa}

/* ---------- MUTATIONS ---------- */
.mut-tag{display:inline-flex;align-items:center;gap:3px;font-family:'Fredoka';font-weight:700;font-size:11px;
  color:var(--mc);background:transparent;border:1.5px solid var(--mc);
  border-radius:999px;padding:2px 8px;margin-top:2px}
.mut-section{margin:10px 0 6px;text-align:left}
.mut-label{font-family:'Fredoka';font-weight:700;font-size:13px;color:#6d28d9;margin-bottom:7px}
.mut-picker{display:flex;flex-wrap:wrap;gap:5px}
.mut-btn{font-family:'Fredoka';font-weight:600;font-size:12px;padding:4px 10px;border-radius:999px;
  border:1.5px solid var(--mc);background:transparent;color:var(--mc);cursor:pointer;transition:all .12s}
.mut-btn:hover,.mut-btn.active{background:var(--mc);color:#fff}
.mut-btn span{font-size:10.5px;opacity:.8}
.stat-mut .v{font-weight:700}

/* ---------- MODAL ---------- */
.modal{position:fixed;inset:0;z-index:100;display:none;padding:20px;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  background:rgba(20,10,45,.82);backdrop-filter:blur(6px)}
.modal.open{display:block;animation:fade .2s ease both}
@keyframes fade{from{opacity:0}to{opacity:1}}
.bigcard{max-width:440px;width:100%;margin:0 auto;background:#fff;border-radius:26px;overflow:hidden;
  border:5px solid var(--rc);box-shadow:0 26px 70px rgba(0,0,0,.5);
  animation:popbig .3s cubic-bezier(.2,1.3,.4,1) both}
@keyframes popbig{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:none}}
.bigstage{height:240px;position:relative;display:grid;place-items:center}
.bigstage .halo{width:210px;height:210px}
.bigstage img{position:relative;z-index:2;max-width:60%;max-height:200px;object-fit:contain;border-radius:14px;
  filter:drop-shadow(0 14px 16px rgba(0,0,0,.3))}
.bigstage .ph{font-size:120px;position:relative;z-index:2}
.bigbody{padding:4px 26px 28px;text-align:center;color:var(--ink)}
.bigbody h2{font-family:'Fredoka';font-weight:700;font-size:27px;margin:2px 0 10px;line-height:1}
.desc{font-family:'Nunito';font-weight:700;color:#5b5285;line-height:1.5;margin:14px 0 16px;font-size:16px}
.who{font-family:'Fredoka';font-weight:600;font-size:14px;color:var(--ink-soft);margin-bottom:16px}
.stats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.stat{background:#f4f2fc;border-radius:14px;padding:9px 16px;min-width:88px}
.stat .k{font-family:'Fredoka';font-weight:500;font-size:11px;color:var(--ink-soft)}
.stat .v{font-family:'Fredoka';font-weight:700;font-size:20px;color:var(--ink);margin-top:1px}
.close{position:absolute;top:12px;right:14px;z-index:4;background:#fff;border:none;
  color:var(--ink);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:22px;font-weight:700;
  box-shadow:0 4px 12px rgba(0,0,0,.25)}
.close:hover{transform:scale(1.08)}

/* ---------- ADD FORM ---------- */
.form-card{max-width:420px;width:100%;margin:0 auto;background:#fff;border-radius:24px;padding:26px;position:relative;
  color:var(--ink);box-shadow:0 26px 70px rgba(0,0,0,.5);animation:popbig .3s cubic-bezier(.2,1.3,.4,1) both}
.form-card h2{font-family:'Fredoka';font-weight:700;font-size:23px;text-align:center;margin-bottom:4px}
.form-card p.sub{text-align:center;font-family:'Nunito';font-weight:700;color:var(--ink-soft);margin-bottom:18px;font-size:14px}
.field{margin-bottom:13px}
.field label{display:block;font-family:'Fredoka';font-weight:600;font-size:14px;color:var(--ink);margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;background:#f4f2fc;border:2px solid #e6e2f5;
  border-radius:12px;padding:11px 13px;color:var(--ink);font-family:'Nunito';font-weight:700;font-size:16px;outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--c-epique)}
.field textarea{resize:vertical;min-height:56px}
.drop{border:2px dashed var(--c-epique);border-radius:12px;padding:16px;text-align:center;cursor:pointer;
  color:var(--ink-soft);font-family:'Fredoka';font-weight:500;font-size:14px;transition:background .15s}
.drop:hover{background:#f7f2ff}
.drop img{max-height:90px;border-radius:10px;margin-top:8px}
.form-actions{display:flex;gap:10px;margin-top:6px}
.btn{flex:1;padding:12px;border-radius:14px;cursor:pointer;font-family:'Fredoka';font-weight:600;font-size:15px;border:none;transition:transform .12s}
.btn:hover{transform:translateY(-2px)}
.btn.primary{color:#fff;background:linear-gradient(90deg,#ff6ec4,#ff9a5a)}
.btn.ghost{background:#f0eefb;color:var(--ink-soft)}

footer{position:relative;z-index:1;text-align:center;padding:20px 18px 46px;color:#c5b8e8;font-family:'Fredoka';font-weight:500;font-size:13px;opacity:.8}

.catch-btn{
  display:block;width:calc(100% - 28px);margin:10px 14px 6px;
  font-family:'Fredoka';font-weight:600;font-size:13.5px;
  padding:9px 10px;border-radius:14px;border:1.5px solid transparent;cursor:pointer;
  background:rgba(255,255,255,.1);color:#d9ccff;
  transition:transform .12s,background .15s,color .15s,border-color .15s;
  position:relative;z-index:4;
}
.catch-btn:hover{transform:translateY(-2px);background:rgba(255,255,255,.18)}
.catch-btn.owned{
  border-color:var(--c,#34c77b);
  color:var(--c,#34c77b);
  background:rgba(255,255,255,.07);
}
.catch-btn.owned:hover{transform:translateY(-2px);background:rgba(255,255,255,.14)}
.coll-picker{
  display:none;flex-wrap:wrap;gap:5px;
  padding:4px 14px 10px;
}
.pick-acc{
  flex:1;min-width:calc(50% - 5px);
  font-family:'Fredoka';font-weight:600;font-size:12px;
  padding:7px 6px;border-radius:10px;
  border:1.5px solid var(--c,#888);
  background:rgba(255,255,255,.05);color:#d9ccff;cursor:pointer;
  transition:background .12s,transform .1s,color .1s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.pick-acc:hover{background:var(--c,#888);color:#111;transform:translateY(-1px)}
.pick-acc.in-coll{background:var(--c,#888);color:#111}
.pick-acc.in-coll::before{content:"✓ "}
.pick-hint{width:100%;font-family:'Fredoka';font-weight:500;font-size:11px;color:#b9a8e6;text-align:center;margin-bottom:2px}
.pick-remove{
  width:100%;margin-top:2px;
  font-family:'Fredoka';font-weight:600;font-size:12px;
  padding:7px;border-radius:10px;border:none;
  background:rgba(255,80,80,.12);color:#ff8080;cursor:pointer;
  transition:background .12s;
}
.pick-remove:hover{background:rgba(255,80,80,.28)}
.card-vals{
  font-family:'Fredoka';font-size:16px;font-weight:700;
  display:flex;gap:6px;justify-content:center;flex-wrap:wrap;
  margin:0 4px 8px;
}
.card-vals span{
  text-shadow:1px 1px 0 rgba(0,0,0,.9),-1px -1px 0 rgba(0,0,0,.9),
              1px -1px 0 rgba(0,0,0,.9),-1px 1px 0 rgba(0,0,0,.9);
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

const LS_KEY    = 'brainrot_owned';
const LS_CAUGHT = 'brainrot_caught';
const LS_VER    = 'brainrot_ver';
if(localStorage.getItem(LS_VER) !== '2') {
  localStorage.removeItem(LS_KEY);
  localStorage.removeItem(LS_CAUGHT);
  localStorage.setItem(LS_VER, '2');
}
/* --- synchro cloud (Firebase) : voir bloc d'init tout en bas --- */
let cloudRef=null, applyingRemote=false, pushTimer=null;
function pushCloud(){
  if(applyingRemote||!cloudRef)return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>{
    cloudRef.set({o:loadOwned(),c:loadCaught(),m:loadMuts(),t:Date.now()}).catch(()=>{});
  },400);
}
function loadOwned(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'{}');}catch(e){return {};}}
function saveOwned(){const d={};COLLECTION.forEach(p=>{if(p.owned)d[p.name]=p.coll;});localStorage.setItem(LS_KEY,JSON.stringify(d));pushCloud();}
function applyOwned(){const d=loadOwned();COLLECTION.forEach(p=>{const v=d[p.name];if(v!=null){p.owned=true;p.coll=Array.isArray(v)?v.filter(c=>c>=1&&c<=5):([v].filter(c=>c>=1&&c<=5));if(!p.coll.length){p.owned=false;p.coll=[1];}}});}
function collArr(p){return Array.isArray(p.coll)?p.coll:[p.coll].filter(Boolean);}
function loadCaught(){try{return JSON.parse(localStorage.getItem(LS_CAUGHT)||'[]');}catch(e){return[];}}
function saveCaught(){localStorage.setItem(LS_CAUGHT,JSON.stringify(COLLECTION.filter(p=>p.caught&&!p.owned).map(p=>p.name)));pushCloud();}
function applyCaught(){const d=loadCaught();COLLECTION.forEach(p=>{if(!p.owned)p.caught=d.includes(p.name);});}
const LS_MUT='brainrot_mut';
function mutKey(p){return p.name;}
function loadMuts(){try{return JSON.parse(localStorage.getItem(LS_MUT)||'{}');}catch(e){return{};}}
function saveMuts(){const d={};COLLECTION.forEach(p=>{if(p.mutation&&p.mutation!=='default')d[mutKey(p)]=p.mutation;});localStorage.setItem(LS_MUT,JSON.stringify(d));pushCloud();}
function applyMuts(){const d=loadMuts();COLLECTION.forEach(p=>{p.mutation=d[mutKey(p)]||'default';});}
function parseRevenu(v){
  if(!v||v==='?')return null;
  const c=v.replace('$','').replace('/s','').replace(',','.').trim();
  const m=c.match(/^([0-9.]+)([KMBkm]?)/i);if(!m)return null;
  let n=parseFloat(m[1]);const u=(m[2]||'').toUpperCase();
  if(u==='K')n*=1e3;else if(u==='M')n*=1e6;else if(u==='B')n*=1e9;
  return n;
}
function formatRevenu(n){
  if(n===null)return'?';
  if(n>=1e12)return'$'+(n/1e12).toFixed(1).replace(/\.0$/,'')+'T/s';
  if(n>=1e9)return'$'+(n/1e9).toFixed(1).replace(/\.0$/,'')+'B/s';
  if(n>=1e6)return'$'+(n/1e6).toFixed(1).replace(/\.0$/,'')+'M/s';
  if(n>=1e3)return'$'+(n/1e3).toFixed(1).replace(/\.0$/,'')+'K/s';
  return'$'+Math.round(n)+'/s';
}
function resetCollection(){
  if(!confirm('Vider toute la collection ? Cette action est irréversible.'))return;
  localStorage.removeItem(LS_KEY);
  localStorage.removeItem(LS_CAUGHT);
  localStorage.removeItem(LS_MUT);
  COLLECTION.forEach(p=>{p.owned=false;p.caught=false;p.coll=[1];p.mutation='default';});
  updateCounter();rerender();pushCloud();
}

const gallery = document.getElementById('gallery');
const compText = document.getElementById('compText');
const compFill = document.getElementById('compFill');
const modal = document.getElementById('modal');
let activeFilter='all', activeColl='all', activeStatus='all', searchTerm='';

function updateCounter(){
  const total=COLLECTION.length, owned=COLLECTION.filter(p=>p.owned).length;
  const caught=COLLECTION.filter(p=>p.caught&&!p.owned).length;
  const pct=total?Math.round(owned/total*100):0;
  if(compText)compText.textContent=`${owned} / ${total} attrapés · ${pct}%`+(caught?` · 👁 ${caught} déjà vu${caught>1?'s':''}` :'');
  if(compFill)compFill.style.width=pct+'%';
}
function rerender(){const y=window.scrollY;gallery.classList.add('no-anim');render();window.scrollTo(0,y);requestAnimationFrame(()=>gallery.classList.remove('no-anim'));}
function patchCard(idx){
  const p=COLLECTION[idx];
  const card=gallery.querySelector(`[data-idx="${idx}"]`);
  if(!card)return;
  const arr=collArr(p);
  const Co=COLLECTIONS[arr[0]]||{};
  card.classList.toggle('todo',!p.owned&&!p.caught);
  card.querySelectorAll('.sparkle').forEach(s=>s.remove());
  if(p.owned&&['legendaire','mythique','dieu','secret','og'].includes(p.tier))
    card.querySelector('.stage').insertAdjacentHTML('afterbegin','<span class="sparkle s1">✨</span><span class="sparkle s2">⭐</span>');
  const badges=card.querySelector('.badges');
  if(badges){
    badges.querySelectorAll('.acc,.todo-tag,.seen-tag').forEach(el=>el.remove());
    badges.insertAdjacentHTML('beforeend',p.owned?accBadge(arr):p.caught?'<span class="seen-tag">👁 Déjà vu</span>':'<span class="todo-tag">⬜ à attraper</span>');
  }
  const cre=card.querySelector('.creature');
  if(cre)cre.style.opacity=(p.owned||p.caught)?'':'.55';
  const btn=card.querySelector('.catch-btn');
  if(btn){
    btn.className='catch-btn'+(p.owned?' owned':'');
    btn.textContent=p.owned?(arr.length>1?'✓ '+arr.length+' bases':'✓ '+(Co.name||'?')):'⭐ Mettre dans une base';
    if(p.owned&&Co.color)btn.style.setProperty('--c',Co.color);
    else btn.style.removeProperty('--c');
  }
  const picker=card.querySelector('.coll-picker');
  if(picker){
    picker.querySelectorAll('.pick-acc').forEach(b=>{
      const c=Number(b.getAttribute('onclick').match(/pickColl\(\d+,(\d+)/)[1]);
      b.classList.toggle('in-coll',p.owned&&arr.includes(c));
    });
  }
  const sb=card.querySelector('.seen-btn');
  if(sb){sb.className='seen-btn'+(p.caught?' active':'');sb.textContent=p.caught?'👁 Déjà vu ✓':'👁 Déjà vu';}
}
window.startPick=function(idx,e){
  e.stopPropagation();
  const card=gallery.querySelector(`[data-idx="${idx}"]`);
  if(!card)return;
  const picker=card.querySelector('.coll-picker');
  if(picker)picker.style.display=picker.style.display==='none'?'flex':'none';
};
window.pickColl=function(idx,c,e){
  e.stopPropagation();
  const p=COLLECTION[idx];
  const arr=collArr(p);
  const i=arr.indexOf(Number(c));
  if(i>=0)arr.splice(i,1); else arr.push(Number(c));
  if(arr.length===0){p.owned=false;p.coll=[1];}
  else{p.owned=true;p.caught=false;p.coll=arr;}
  saveOwned();saveCaught();updateCounter();
  if(activeStatus!=='all'){rerender();return;}
  patchCard(idx);
};
window.removePick=function(idx,e){
  e.stopPropagation();
  const p=COLLECTION[idx];
  if(!p.owned){const c=gallery.querySelector('[data-idx="'+idx+'"] .coll-picker');if(c)c.style.display='none';return;}
  p.owned=false;p.coll=[1];
  saveOwned();updateCounter();
  if(activeStatus!=='all'){rerender();return;}
  patchCard(idx);
};
window.pickMut=function(idx,key){
  COLLECTION[idx].mutation=key;
  saveMuts();
  openPiece(idx);
  const card=gallery.querySelector(`[data-idx="${idx}"]`);
  if(!card)return;
  const p=COLLECTION[idx];const M=MUTATIONS[key]||MUTATIONS.default;
  const badges=card.querySelector('.badges');
  if(badges){
    const old=badges.querySelector('.mut-tag');
    if(old)old.remove();
    if(key!=='default'){
      const span=document.createElement('span');
      span.className='mut-tag';span.style.setProperty('--mc',M.color);
      span.textContent=`✦ ${M.label} ×${M.mult}`;
      badges.appendChild(span);
    }
  }
};
window.toggleCaught=function(idx,e){
  e.stopPropagation();
  const p=COLLECTION[idx];
  if(p.owned)return;
  p.caught=!p.caught;
  saveCaught();updateCounter();
  if(activeStatus==='owned'||(activeStatus==='todo'&&p.caught)){rerender();return;}
  patchCard(idx);
};

function visible(){
  return COLLECTION.filter(p=>{
    const okTier = activeFilter==='all' || p.tier===activeFilter;
    const okColl = activeColl==='all' || (p.owned && collArr(p).includes(Number(activeColl)));
    const okStatus = activeStatus==='all'
      || (activeStatus==='owned' ? p.owned
        : activeStatus==='todo' ? (!p.owned && !p.caught)
        : !p.owned);
    const okSearch = p.name.toLowerCase().includes(searchTerm);
    return okTier && okColl && okStatus && okSearch;
  });
}
function escape(s){return (s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]))}
function fmtVal(v){return(!v||v==='?')?null:(v[0]==='$'?v:'$'+v);}
function valColor(v){
  if(!v||v==='?')return'#9ca3af';
  return v.includes('/s') ? '#ffff00' : '#39ff14';
}
function subjectHTML(p){
  if(p.img){
    return `<img src="${p.img}" alt="${escape(p.name)}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'ph',textContent:'${p.emoji||'🖼️'}'}))">`;
  }
  return `<div class="ph">${p.emoji||'🖼️'}</div>`;
}
function accBadge(coll){
  const arr=Array.isArray(coll)?coll:[coll];
  return arr.map(c=>{const C=COLLECTIONS[c];return C?'<span class="acc" style="--c:'+C.color+'">'+escape(C.name)+'</span>':''}).join('');
}

function render(){
  updateCounter();
  const list = visible();
  gallery.innerHTML = list.map((p,i)=>{
    const t = TIERS[p.tier]||TIERS.commun;
    const idx = COLLECTION.indexOf(p);
    const arr = collArr(p);
    const Co = COLLECTIONS[arr[0]]||{};
    const spark = (p.owned && (p.tier==='legendaire'||p.tier==='mythique'||p.tier==='dieu'||p.tier==='secret'||p.tier==='og'))
      ? `<span class="sparkle s1">✨</span><span class="sparkle s2">⭐</span>` : '';
    const badge = p.owned ? accBadge(arr) : p.caught ? `<span class="seen-tag">👁 Déjà vu</span>` : `<span class="todo-tag">⬜ à attraper</span>`;
    const M = MUTATIONS[p.mutation||'default']||MUTATIONS.default;
    const mutBadge = (p.owned && p.mutation && p.mutation!=='default') ? `<span class="mut-tag" style="--mc:${M.color}">✦ ${M.label} ×${M.mult}</span>` : '';
    const catchStyle = p.owned && Co.color ? ` style="--c:${Co.color}"` : '';
    const catchLabel = p.owned ? (arr.length>1?`✓ ${arr.length} bases`:`✓ ${escape(Co.name||'?')}`) : '⭐ Mettre dans une base';
    const seenLabel = p.caught ? '👁 Déjà vu ✓' : '👁 Déjà vu';
    const pickerBtns = Object.entries(COLLECTIONS).map(([n,C])=>{
      const act=p.owned&&arr.includes(Number(n))?' in-coll':'';
      return `<button class="pick-acc${act}" style="--c:${C.color}" onclick="pickColl(${idx},${n},event)">${escape(C.name)}</button>`;
    }).join('');
    const prixFmt=fmtVal(p.prix), revFmt=fmtVal(p.revenu);
    const vals=(prixFmt||revFmt)?`<div class="card-vals">${
      prixFmt?`<span style="color:${valColor(p.prix)}">💰 ${escape(prixFmt)}</span>`:''
    }${
      revFmt?`<span style="color:${valColor(p.revenu)}">📈 ${escape(revFmt)}</span>`:''
    }</div>`:'';
    return `
    <div class="card ${t.cls} ${p.owned?'':(p.caught?'':'todo')}" data-idx="${idx}" style="--rc:${RC[p.tier]};animation-delay:${Math.min(i*0.04,0.6)}s" onclick="openPiece(${idx})">
      <div class="idtag">#${String(idx+1).padStart(3,'0')}</div>
      <div class="stage">
        <div class="halo"></div>
        ${spark}
        <div class="subject"><div class="creature" style="opacity:${(p.owned||p.caught)?'1':'.55'}">${subjectHTML(p)}</div></div>
        ${(p.owned && !p.img)?'<div class="ph-note">photo à ajouter</div>':''}
      </div>
      <div class="info">
        <div class="pname">${escape(p.name)}</div>
        ${vals}
        <div class="badges">
          <span class="tier">${t.label}</span>
          ${badge}${mutBadge}
        </div>
      </div>
      <button class="catch-btn ${p.owned?'owned':''}"${catchStyle} onclick="startPick(${idx},event)">${catchLabel}</button>
      ${!p.owned?`<button class="seen-btn${p.caught?' active':''}" onclick="toggleCaught(${idx},event)">${seenLabel}</button>`:''}
      <div class="coll-picker" style="display:none">
        <div class="pick-hint">Coche un ou plusieurs comptes 👇</div>
        ${pickerBtns}
        <button class="pick-remove" onclick="removePick(${idx},event)">🗑 Retirer de partout</button>
      </div>
    </div>`;
  }).join('');
  if(!list.length){
    gallery.innerHTML = `<p style="grid-column:1/-1;text-align:center;font-family:'Fredoka';font-weight:500;color:#d9ccff;padding:50px 0">
      Rien ici pour l'instant 👀</p>`;
  }
}

function mutPickerHTML(idx,p){
  var cur=p.mutation||'default', html='';
  Object.entries(MUTATIONS).forEach(function(e){
    var k=e[0],Mu=e[1];
    var act=cur===k?' active':'';
    html+='<button class="mut-btn'+act+'" style="--mc:'+Mu.color+'" onclick="pickMut('+idx+',\''+k+'\')">'+Mu.label+' <span>'+Mu.mult+'x</span></button>';
  });
  return '<div class="mut-section"><div class="mut-label">✶ Mutation</div><div class="mut-picker">'+html+'</div></div>';
}
function mutStatHTML(p){
  var Mu=MUTATIONS[p.mutation||'default']||MUTATIONS.default;
  if(!p.owned||Mu.mult<=1)return'';
  var n=parseRevenu(p.revenu);
  if(n===null)return'';
  return'<div class="stat stat-mut" style="--mc:'+Mu.color+'"><div class="k">⚡ Avec '+Mu.label+'</div><div class="v" style="color:'+Mu.color+'">'+formatRevenu(n*Mu.mult)+'</div></div>';
}
window.openPiece = function(idx){
  const p=COLLECTION[idx]; const t=TIERS[p.tier]||TIERS.commun;
  const arr=collArr(p);
  const accNames=arr.map(c=>(COLLECTIONS[c]||{}).name).filter(Boolean).join(', ');
  const descTxt=escape(p.desc||((!p.owned&&!p.caught)?'Pas encore attrapé — à dénicher dans le jeu !':''));
  const whoTxt=p.owned?(arr.length>1?'🎮 Comptes : ':'🎮 Compte : ')+escape(accNames||'?'):p.caught?'👁 Déjà attrapé, pas dans une base':'⬜ Pas encore attrapé';
  modal.innerHTML=
    '<div class="bigcard '+t.cls+'" style="--rc:'+RC[p.tier]+'">'
    +'<button class="close" onclick="closeModal()">\xd7</button>'
    +'<div class="bigstage"><div class="halo"></div>'+subjectHTML(p)+'</div>'
    +'<div class="bigbody">'
    +'<h2>'+escape(p.name)+'</h2>'
    +'<div class="badges"><span class="tier">'+t.label+'</span></div>'
    +'<p class="desc">'+descTxt+'</p>'
    +'<div class="who">'+whoTxt+'</div>'
    +(p.owned?mutPickerHTML(idx,p):'')
    +'<div class="stats">'
    +'<div class="stat"><div class="k">💰 Prix</div><div class="v">'+escape(p.prix||'?')+'</div></div>'
    +'<div class="stat"><div class="k">📈 Revenu/s</div><div class="v">'+escape(p.revenu||'?')+'</div></div>'
    +mutStatHTML(p)
    +'</div>'
    +'</div>'
    +'</div>';
  modal.classList.add('open');
};
window.closeModal = ()=>modal.classList.remove('open');
modal.addEventListener('click',e=>{if(e.target===modal)closeModal()});

/* ---- Sauvegarde / synchronisation entre appareils ---- */
const syncModal=document.getElementById('syncModal');
function buildSyncCode(){
  try{
    const payload=JSON.stringify({o:loadOwned(),c:loadCaught(),m:loadMuts()});
    return btoa(unescape(encodeURIComponent(payload)));
  }catch(e){return'';}
}
window.openSync=function(){
  syncModal.innerHTML=
    '<div class="form-card">'
    +'<button class="close" onclick="closeSync()">\xd7</button>'
    +'<h2>💾 Sauvegarde</h2>'
    +'<p class="sub">Pour retrouver ta collection sur un autre appareil (téléphone ↔ ordi)</p>'
    +'<div class="sync-step">1️⃣ Sur l\'appareil qui a ta collection : copie ce code</div>'
    +'<textarea class="sync-code" id="syncOut" readonly onclick="this.select()">'+buildSyncCode()+'</textarea>'
    +'<button class="btn primary" style="margin-top:8px;width:100%" onclick="copySync()">📋 Copier le code</button>'
    +'<div class="sync-ok" id="syncMsg"></div>'
    +'<div class="sync-step">2️⃣ Sur l\'autre appareil : colle le code ici et charge</div>'
    +'<textarea class="sync-code" id="syncIn" placeholder="Colle ton code ici…"></textarea>'
    +'<div class="form-actions">'
    +'<button class="btn ghost" onclick="closeSync()">Annuler</button>'
    +'<button class="btn primary" onclick="doImport()">⬇️ Charger</button>'
    +'</div>'
    +'</div>';
  syncModal.classList.add('open');
};
window.closeSync=()=>syncModal.classList.remove('open');
syncModal.addEventListener('click',e=>{if(e.target===syncModal)closeSync()});
window.copySync=function(){
  const ta=document.getElementById('syncOut');
  const msg=document.getElementById('syncMsg');
  ta.select();ta.setSelectionRange(0,99999);
  const done=()=>{if(msg)msg.textContent='✓ Code copié !';};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(ta.value).then(done).catch(()=>{try{document.execCommand('copy');done();}catch(e){}});
  }else{try{document.execCommand('copy');done();}catch(e){}}
};
window.doImport=function(){
  const code=(document.getElementById('syncIn').value||'').trim();
  if(!code){alert('Colle d\'abord un code dans la case.');return;}
  let data;
  try{data=JSON.parse(decodeURIComponent(escape(atob(code))));}
  catch(e){alert('Ce code n\'est pas valide. Recopie-le en entier.');return;}
  if(!confirm('Charger cette collection ? Ça remplacera ce qui est sur cet appareil.'))return;
  if(data.o)localStorage.setItem(LS_KEY,JSON.stringify(data.o));
  if(data.c)localStorage.setItem(LS_CAUGHT,JSON.stringify(data.c));
  if(data.m)localStorage.setItem(LS_MUT,JSON.stringify(data.m));
  localStorage.setItem(LS_VER,'2');
  if(cloudRef){
    cloudRef.set({o:data.o||{},c:data.c||[],m:data.m||{},t:Date.now()})
      .then(()=>location.reload()).catch(()=>location.reload());
  }else{location.reload();}
};

/* ---------- SYNCHRO CLOUD (Firebase Realtime Database) ----------
   La collection de Leomz est stockée en ligne : elle le suit sur
   n'importe quel appareil. Sauvegarde et chargement automatiques. */
(function initCloud(){
  const firebaseConfig = {
    apiKey: "AIzaSyCIMj0dIVe1mYc32qbI63-LWs9Jl2qaXYg",
    authDomain: "musee-brainrots.firebaseapp.com",
    databaseURL: "https://musee-brainrots-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "musee-brainrots",
    storageBucket: "musee-brainrots.firebasestorage.app",
    messagingSenderId: "436035486022",
    appId: "1:436035486022:web:856dfd8c4270ee8c9ca547"
  };
  if(typeof firebase==='undefined'){console.warn('Firebase non chargé — mode hors-ligne');return;}
  try{
    firebase.initializeApp(firebaseConfig);
    cloudRef = firebase.database().ref('leomz');
  }catch(e){console.warn('Firebase init KO',e);return;}

  const seedNow=()=>{ if(cloudRef)cloudRef.set({o:loadOwned(),c:loadCaught(),m:loadMuts(),t:Date.now()}).catch(()=>{}); };
  cloudRef.on('value', snap=>{
    const data=snap.val()||{};
    const remoteVide = !snap.exists() || !data.o || Object.keys(data.o).length===0;
    const localPlein = Object.keys(loadOwned()).length>0;
    // Sécurité : si le cloud est vide mais que CET appareil a une collection,
    // on envoie la nôtre au lieu de se faire écraser par du vide.
    if(remoteVide){
      if(localPlein) seedNow();
      else if(!snap.exists()) seedNow();
      return;
    }
    applyingRemote=true;
    localStorage.setItem(LS_KEY,   JSON.stringify(data.o||{}));
    localStorage.setItem(LS_CAUGHT,JSON.stringify(data.c||[]));
    localStorage.setItem(LS_MUT,   JSON.stringify(data.m||{}));
    localStorage.setItem(LS_VER,'2');
    COLLECTION.forEach(p=>{p.owned=false;p.caught=false;p.coll=[1];p.mutation='default';});
    applyOwned();applyCaught();applyMuts();
    updateCounter();rerender();
    applyingRemote=false;
  }, err=>{console.warn('Lecture cloud KO',err);});
})();
